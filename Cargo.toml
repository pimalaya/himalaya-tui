[package]
name = "himalaya-tui"
description = "TUI to manage emails"
version = "0.1.0"
authors = ["Clement DOUIN <pimalaya.org@posteo.net>"]
edition = "2021"
license = "MIT"
categories = ["command-line-utilities", "email"]
keywords = ["tui", "email", "imap", "ratatui"]
homepage = "https://pimalaya.org"
documentation = "https://github.com/pimalaya/himalaya-tui"
repository = "https://github.com/pimalaya/himalaya-tui"

[package.metadata.docs.rs]
features = ["imap"]
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["imap", "rustls-ring"]
imap = ["dep:io-imap"]
rustls-aws = ["dep:rustls-platform-verifier", "rustls/aws-lc-rs"]
rustls-ring = ["dep:rustls-platform-verifier", "rustls/ring"]
native-tls = ["dep:native-tls"]

[build-dependencies]
pimalaya-toolbox = { version = "0.0.4", default-features = false, features = ["build"] }

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false }
edtui = { version = "0.11", features = ["system-editor"] }
html2text = "0.12"
io-imap = { version = "0.0.1", default-features = false, optional = true }
io-process = { version = "0.0.2", default-features = false }
io-stream = { version = "0.0.2", default-features = false, features = ["std"] }
log = "0.4"
mail-parser = "0.9"
mml = "1"
native-tls = { version = "0.2", optional = true }
pimalaya-toolbox = { version = "0.0.4", default-features = false, features = ["config", "terminal", "secret", "command"] }
ratatui = "0.30"
rfc2047-decoder = "1"
rustls = { version = "0.23", default-features = false, optional = true }
rustls-platform-verifier = { version = "0.6", optional = true }
secrecy = "0.10"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shellexpand = "3.1"
url = { version = "2.2", features = ["serde"] }
uuid = { version = "1.19", features = ["v4"] }

[target.'cfg(windows)'.dependencies]
uds_windows = "1"

[patch.crates-io]
io-imap.path = "../imap"
io-process.path = "../process"
mml.path = "../mml"
pimalaya-toolbox.path = "../toolbox"
